name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement"]
assignees: ["Dustin21335"]

body:
  - type: markdown
    attributes:
      value: "Thank you for suggesting a feature! Please provide as much detail as possible about your idea."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the new feature or enhancement you are proposing.
      placeholder: "What feature would you like to see?"
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Explain how this feature would improve the project or benefit users.
      placeholder: "How would this feature be useful?"
    validations:
      required: true
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request here.
      placeholder: "Any other relevant information?"
