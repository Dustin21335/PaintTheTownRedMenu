name: Bug Report
description: Report a bug to help improve the cheat
title: "[BUG] "
labels: ["bug"]
assignees: ["Dustin21335"]

body:
  - type: markdown
    attributes:
      value: "Thank you for reporting a bug! Please provide as much detail as possible to help us fix it."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the bug you encountered.
      placeholder: "What happened?"
    validations:
      required: true

  - type: input
    id: menu_version
    attributes:
      label: Menu Version
      placeholder: "e.g., v1.0.0"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: Game Version
      placeholder: "e.g., 1.3.4"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the bug.
      placeholder: |
        1. First step
        2. Second step
        3. Third Step
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
      placeholder: "Paste or drag images here"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: "Any other relevant information?"
